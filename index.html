<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سُكر وبُن</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

<div class="app-container">

    <!-- الهيدر -->
    <header>

        <div class="user-info">
            <span>أهلاً وسهلاً</span>
            <h1>مرحباً بك في بن وسكر 🤎</h1>
        </div>

        <div class="cart-icon">
            <i class="fas fa-shopping-bag"></i>
            <span id="cart-count">0</span>
        </div>

    </header>

    <!-- البانر -->
    <section class="promo-banner">

        <div class="slider">
            <img src="مشروع/94601b2cb7dea9d830498c2d3d4275b0.jpg" class="slide active">
            <img src="مشروع/1523755196d3f9efd026c96e260d2800.jpg" class="slide">
            <img src="مشروع/c4b403a2cea16af5166e636838a1493c.jpg" class="slide">
        </div>

        <div class="promo-text">
            <h2>نصنع القهوة ونصنع منها الذكريات</h2>
            <h2>مزاجك يبدأ من هنا ☕</h2>

            <button class="btn-order">اطلب الآن ←</button>
        </div>

        <button class="arrow left" onclick="changeSlide(-1)">‹</button>
        <button class="arrow right" onclick="changeSlide(1)">›</button>

    </section>

    <!-- التصنيفات -->
    <section class="categories">

        <div class="category-item"
            onclick="displayProducts('مشروبات ساخنة', this.querySelector('.icon-box'))">

            <div class="icon-box active">
                <i class="fas fa-mug-hot"></i>
            </div>

            <span>مشروبات ساخنة</span>
        </div>

        <div class="category-item"
            onclick="displayProducts('مشروبات باردة', this.querySelector('.icon-box'))">

            <div class="icon-box">
                <i class="fas fa-glass-whiskey"></i>
            </div>

            <span>مشروبات باردة</span>
        </div>

        <div class="category-item"
            onclick="displayProducts('حلويات', this.querySelector('.icon-box'))">

            <div class="icon-box">
                <i class="fas fa-birthday-cake"></i>
            </div>

            <span>حلويات</span>
        </div>

    </section>

    <!-- المنتجات -->
    <section id="productDisplay" class="product-grid"></section>

    <!-- التقييمات -->
    <section class="reviews-section">

        <h2>آراء الزبائن 💬</h2>

        <div class="review-form">

            <input type="text" id="customerName" placeholder="اسمك">

            <textarea id="customerReview" placeholder="اكتب رأيك..."></textarea>

           <div class="stars" id="editStarRating">
                    <i class="fas fa-star" data-value="1"></i>
                      <i class="fas fa-star" data-value="2"></i>
                        <i class="fas fa-star" data-value="3"></i>
                          <i class="fas fa-star" data-value="4"></i>
                            <i class="fas fa-star" data-value="5"></i>
                          </div>

            <button onclick="addReview()">إرسال التقييم</button>

        </div>

        <div id="reviewsContainer" class="reviews-container"></div>

    </section>

    <!-- نافذة التعديل -->
    <div id="editModal" class="modal">

        <div class="modal-content">

            <h3>تعديل التقييم ✏️</h3>

            <input type="text" id="editName" placeholder="الاسم">

            <textarea id="editReview" placeholder="التعليق"></textarea>

            <select id="editRating">
                <option value="5">⭐⭐⭐⭐⭐</option>
                <option value="4">⭐⭐⭐⭐</option>
                <option value="3">⭐⭐⭐</option>
                <option value="2">⭐⭐</option>
                <option value="1">⭐</option>
            </select>

            <div class="modal-actions">

                <button onclick="saveEdit()">حفظ</button>

                <button onclick="closeModal()">إلغاء</button>

            </div>

        </div>

    </div>

    <!-- الناف بار -->
    <nav class="bottom-nav">

        <a href="index.html" class="active">
            <i class="fas fa-home"></i>
        </a>

        <a href="cart.html">
            <i class="fas fa-shopping-bag"></i>
        </a>

        <a href="#">
            <i class="fas fa-heart"></i>
        </a>

        <a href="login.html">
            <i class="fas fa-user"></i>
        </a>

    </nav>

</div>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script src="script.js"></script>

</body>
</html>
