<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<link rel="stylesheet" href="admin-style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="admin-wrap">

    <!-- HEADER -->
    <div class="topbar">👨‍💼 لوحة المدير</div>

    <!-- STATS -->
    <div class="stats">

        <div class="stat">
            <h3 id="newOrders">0</h3>
            <p>طلبات جديدة</p>
        </div>

        <div class="stat">
            <h3 id="doneOrders">0</h3>
            <p>جاهزة</p>
        </div>

        <div class="stat">
            <h3 id="sales">0</h3>
            <p>المبيعات</p>
        </div>

    </div>

    <!-- CHART -->
    <div class="box">
        <canvas id="chart"></canvas>
    </div>

    <!-- ORDERS -->
    <div class="box">
        <h3>📦 إدارة الطلبات</h3>
        <div id="ordersList"></div>
    </div>

</div>

<script src="admin.js"></script>

</body>
</html>
